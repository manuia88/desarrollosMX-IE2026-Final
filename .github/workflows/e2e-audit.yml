name: E2E Audit (ADR-018)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  audit-dead-ui:
    name: Audit dead UI (ADR-018 E2E Connectedness)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Run audit-dead-ui
        run: npm run audit:dead-ui:ci > audit-report.json
      - name: Typecheck
        run: npm run typecheck
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
